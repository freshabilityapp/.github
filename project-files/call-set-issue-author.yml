# Place in EVERY repo whose issues land on the project:
#   .github/workflows/project-author.yml
#
# This is the only file that needs to be copied around. All logic lives in the
# reusable workflow in freshabilityapp/.github.

name: Project Created By field

on:
  issues:
    types: [opened, transferred, reopened]

jobs:
  set-author:
    uses: freshabilityapp/.github/.github/workflows/set-issue-author.yml@main
    with:
      project-owner: freshabilityapp
      project-number: 1           # <-- from the project URL
      field-name: Created By        # "Author" is a reserved field name in Projects
      fallback-option: External   # catch-all for unmapped logins; the weekly
                                  # backfill cron reassigns these to the real
                                  # login once an option exists
    secrets:
      projects-token: ${{ secrets.PROJECTS_CREATED_BY_PAT }}   # org-level secret
